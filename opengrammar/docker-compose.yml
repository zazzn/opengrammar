version: '3.8'

services:
  # OpenGrammar Backend API
  opengrammar-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=production
      - PORT=8787
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - opengrammar-network

  # Ollama for local LLM inference (optional - comment out if using cloud APIs)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # Uncomment below for GPU support (NVIDIA)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - opengrammar-network
    profiles:
      - local-llm

  # Optional: Auto-pull models on startup
  ollama-init:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: >
      sh -c '
        sleep 5 &&
        ollama pull qwen2.5:0.5b &&
        ollama pull qwen2.5:1.5b
      '
    depends_on:
      - ollama
    networks:
      - opengrammar-network
    profiles:
      - local-llm

volumes:
  ollama-data:
    driver: local

networks:
  opengrammar-network:
    driver: bridge
