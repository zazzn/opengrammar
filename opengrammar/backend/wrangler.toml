name = "opengrammar-backend"
main = "src/index.ts"
compatibility_date = "2024-02-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

# Development variables
[vars]
ENV = "development"
DEBUG = true

# Production environment
[env.production]
vars = { ENV = "production", DEBUG = false }
