<!-- OpenGrammar Logo — Quill + checkmark in indigo circle -->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)"/>
  <!-- Subtle shine overlay -->
  <circle cx="64" cy="64" r="60" fill="url(#shineGrad)"/>

  <!-- Quill pen shape (represents writing) -->
  <!-- Feather body -->
  <path d="M82 26 C92 30, 98 42, 90 58 C84 70, 70 76, 58 82 L44 96 C42 98, 40 98, 40 96 
           C40 94, 44 88, 48 84 C54 72, 60 58, 68 46 C76 34, 82 26, 82 26 Z"
        fill="white" fill-opacity="0.92"/>
  <!-- Quill spine -->
  <path d="M82 26 L46 88" stroke="url(#bgGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Feather vanes left -->
  <path d="M74 38 C68 44, 62 52, 56 60" stroke="#4F46E5" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M78 44 C72 50, 66 58, 60 66" stroke="#4F46E5" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Nib tip -->
  <path d="M46 88 L44 96 C44 96, 50 92, 52 86 Z" fill="white" fill-opacity="0.95"/>

  <!-- Small checkmark badge (bottom-right) -->
  <circle cx="89" cy="89" r="16" fill="#EEF2FF" stroke="white" stroke-width="2.5"/>
  <path d="M82 89 L87 94 L96 83" stroke="#4F46E5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
