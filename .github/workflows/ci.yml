name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install and Build Shared
      run: |
        cd opengrammar/shared
        bun install

    - name: Install and Build Backend
      run: |
        cd opengrammar/backend
        bun install
        bun run build

    - name: Install and Build Extension
      run: |
        cd opengrammar/extension
        bun install
        bun run build
