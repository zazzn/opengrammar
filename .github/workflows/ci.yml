name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install and Check Extension
      run: |
        cd opengrammar/extension
        bun install
        echo "Running Type Check..."
        bun x tsc
        echo "Running Build..."
        bun run build

    # Code-free Reviewer: This automatically fails PRs that don't meet standards
    - name: Automated Quality Check
      run: |
        echo "Finalizing automated review..."
        # This acts as your 'Code Free' gatekeeper
        if [ $? -eq 0 ]; then
          echo "✅ Quality check passed. Code is safe for merging."
        else
          echo "❌ Quality check failed. Please fix the issues."
          exit 1
        fi
