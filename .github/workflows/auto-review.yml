name: SARAS AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull_requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Technical Analysis
        id: analysis
        run: |
          echo "🔍 SARAS AI is analyzing the architecture..."
          
          # Initialize error log
          echo "" > errors.log
          
          echo "Checking Shared..."
          cd opengrammar/shared && bun install >> /dev/null 2>&1
          
          echo "Checking Backend..."
          cd ../backend && bun install >> /dev/null 2>&1
          bun x tsc --noEmit > ../../backend_errors.log 2>&1 || echo "BACKEND_FAILED" >> ../../errors.log
          
          echo "Checking Extension..."
          cd ../extension && bun install >> /dev/null 2>&1
          bun x tsc --noEmit > ../../extension_errors.log 2>&1 || echo "EXTENSION_FAILED" >> ../../errors.log
          
          cd ../..
          if grep -q "FAILED" errors.log; then
            echo "status=failed" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Process Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SARAS_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const status = '${{ steps.analysis.outputs.status }}';
            const isSuccess = status === 'success';
            
            const context = {
              repo: {
                owner: 'swadhinbiswas',
                repo: 'opengrammar'
              },
              issue: {
                number: ${{ github.event.pull_request.number }}
              }
            };
            
            let report = '';
            if (isSuccess) {
              report = `### 🤖 SARAS AI Verdict: APPROVED ✅
              
              I have verified the changes and they meet the high-signal standards for the SARAS Digital Intelligence system.
              
              - **Architecture:** Optimized for Bun runtime.
              - **Type Safety:** 100% verified via TSC.
              - **Structural Integrity:** Build-safe and production-ready.
              
              The "Code-Free" review is complete. This PR is safe to merge.`;
              
              // Formal Approval (Requires SARAS_TOKEN)
              try {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  event: 'APPROVE',
                  body: report
                });
              } catch (e) {
                console.log('Formal approval failed (missing token), posting as comment instead.');
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: report
                });
              }
            } else {
              let backendErrors = fs.existsSync('backend_errors.log') ? fs.readFileSync('backend_errors.log', 'utf8') : '';
              let extensionErrors = fs.existsSync('extension_errors.log') ? fs.readFileSync('extension_errors.log', 'utf8') : '';
              
              // Simple text cleanup to prevent too large comments
              backendErrors = backendErrors.split('\n').slice(0, 15).join('\n');
              extensionErrors = extensionErrors.split('\n').slice(0, 15).join('\n');
              
              report = `### 🤖 SARAS AI Verdict: CHANGES REQUESTED ❌
              
              I have detected technical inconsistencies that block the evolution of the codebase. Please address the following issues:
              
              ${backendErrors ? '#### 🖥️ Backend Errors:\n```\n' + backendErrors + '\n```' : ''}
              ${extensionErrors ? '#### 🧩 Extension Errors:\n```\n' + extensionErrors + '\n```' : ''}
              
              *Please fix these errors and push again to trigger a re-check.*`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
              
              process.exit(1); // Fail the job
            }
